<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Job Tracker</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        width: 260px;
        padding: 16px;
        color: #1e293b;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      #page-title {
        font-size: 12px;
        color: #64748b;
        margin: 0 0 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      button {
        width: 100%;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 500;
        color: white;
        background: #1e293b;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      button:hover:not(:disabled) {
        background: #334155;
      }
      .status {
        margin-top: 10px;
        font-size: 12px;
        color: #64748b;
        min-height: 14px;
      }
      .status.error {
        color: #e11d48;
      }
    </style>
  </head>
  <body>
    <h1>Job Tracker</h1>
    <p id="page-title"></p>
    <button id="send" type="button">Send to Job Tracker</button>
    <p id="status" class="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
